server {
    listen 80;
    server_name _;

    # Docker internal DNS resolver — resolves upstreams dynamically
    resolver 127.0.0.11 valid=30s ipv6=off;

    # ─────────────────────────────────────────
    # Media API (keep /api prefix)
    # ─────────────────────────────────────────
    location /api/ {
        limit_req zone=api burst=20 nodelay;

        set $media_api_backend "http://media-api:8000";
        proxy_pass $media_api_backend;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 10s;
    }

    # API Docs (Swagger / ReDoc)
    location /docs {
        set $media_api_docs "http://media-api:8000/docs";
        proxy_pass $media_api_docs;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /openapi.json {
        set $media_api_openapi "http://media-api:8000/openapi.json";
        proxy_pass $media_api_openapi;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # ─────────────────────────────────────────
    # Jellyfin (Host system or Docker container)
    # ─────────────────────────────────────────
    location /jellyfin/ {
        set $jellyfin_backend "http://host.docker.internal:8096";
        proxy_pass $jellyfin_backend/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_buffering off;
    }

    # ─────────────────────────────────────────
    # Dashboard (Phase 17)
    # ─────────────────────────────────────────
    location = / {
        return 302 /dashboard/;
    }

    location = /dashboard {
        return 301 /dashboard/;
    }

    location /dashboard/ {
        set $dashboard_backend "http://dashboard:8014";
        rewrite ^/dashboard/(.*) /$1 break;
        proxy_pass $dashboard_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /static/ {
        set $dashboard_static "http://dashboard:8014/static/";
        proxy_pass $dashboard_static;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    location /dashboard/static/ {
        set $dashboard_static2 "http://dashboard:8014/static/";
        proxy_pass $dashboard_static2;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
    }

    # AI service (optional direct)
    location /ai/ {
        set $ai_backend "http://ai-service:8013/";
        proxy_pass $ai_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_read_timeout 300s;
    }

    # Entertainment service (API + live stream proxy)
    location /entertainment/ {
        set $ent_backend "http://entertainment-service:8012/";
        proxy_pass $ent_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Stream proxy via media-api gateway path (long-lived)
    location /api/v1/entertainment/stream/ {
        set $media_api_stream "http://media-api:8000";
        proxy_pass $media_api_stream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header Range $http_range;
        proxy_buffering off;
        proxy_read_timeout 3600s;
    }

    # Health check endpoint
    location /health {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
    }
}
