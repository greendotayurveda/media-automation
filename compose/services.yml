# Media Automation Platform — Services Compose
# Usage (from project root): docker compose --env-file .env -f compose/infrastructure.yml -f compose/services.yml up -d --build

name: media-platform

networks:
  frontend:
    name: mp_frontend
    external: true
  backend:
    name: mp_backend
    external: true
  media:
    name: mp_media
    external: true

services:

  # ─────────────────────────────────────────────
  # Phase 4: Workflow Engine (State Machine Orchestrator)
  # ─────────────────────────────────────────────
  workflow-engine:
    build:
      context: ..
      dockerfile: services/workflow-engine/Dockerfile
    image: media-platform/workflow-engine:latest
    container_name: mp_workflow_engine
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - backend
    depends_on:
      - media-api

  # ─────────────────────────────────────────────
  # Phase 5: Media API (Central Gateway API)
  # ─────────────────────────────────────────────
  media-api:
    build:
      context: ..
      dockerfile: services/media-api/Dockerfile
    image: media-platform/media-api:latest
    container_name: mp_media_api
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "${API_PORT:-8000}:8000"
    networks:
      - frontend
      - backend
      - media

  # ─────────────────────────────────────────────
  # Local Telegram Bot API Server (Unlocks 2GB file downloads)
  # ─────────────────────────────────────────────
  telegram-bot-api:
    image: aiogram/telegram-bot-api:latest
    container_name: mp_telegram_bot_api
    restart: unless-stopped
    command: ["--local", "--api-id=${TELEGRAM_API_ID}", "--api-hash=${TELEGRAM_API_HASH}"]
    env_file:
      - ../.env
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_STAT: "1"
    volumes:
      - /opt/media-platform/data/telegram-bot-api:/var/lib/telegram-bot-api
      - /opt/media-platform/data:/opt/media-platform/data
    ports:
      - "8081:8081"
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 6: Telegram Service (Media Ingestion & Bot)
  # ─────────────────────────────────────────────
  telegram-service:
    build:
      context: ..
      dockerfile: services/telegram-service/Dockerfile
    image: media-platform/telegram-service:latest
    container_name: mp_telegram_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 8: Analyzer Service (FFprobe Specs Extractor)
  # ─────────────────────────────────────────────
  analyzer-service:
    build:
      context: ..
      dockerfile: services/analyzer-service/Dockerfile
    image: media-platform/analyzer-service:latest
    container_name: mp_analyzer_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 9: Metadata Service (TMDb / IMDb Metadata Fetcher)
  # ─────────────────────────────────────────────
  metadata-service:
    build:
      context: ..
      dockerfile: services/metadata-service/Dockerfile
    image: media-platform/metadata-service:latest
    container_name: mp_metadata_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 10: Subtitle Service (Subtitle Fetcher & UTF-8 Normalizer)
  # ─────────────────────────────────────────────
  subtitle-service:
    build:
      context: ..
      dockerfile: services/subtitle-service/Dockerfile
    image: media-platform/subtitle-service:latest
    container_name: mp_subtitle_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 11: Organizer Service (Jellyfin Layout & Refresh)
  # ─────────────────────────────────────────────
  organizer-service:
    build:
      context: ..
      dockerfile: services/organizer-service/Dockerfile
    image: media-platform/organizer-service:latest
    container_name: mp_organizer_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend
      - media

  # ─────────────────────────────────────────────
  # Phase 12: Quality Service (Score / Upgrade Decision)
  # ─────────────────────────────────────────────
  quality-service:
    build:
      context: ..
      dockerfile: services/quality-service/Dockerfile
    image: media-platform/quality-service:latest
    container_name: mp_quality_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 7: Download Service
  # ─────────────────────────────────────────────
  download-service:
    build:
      context: ..
      dockerfile: services/download-service/Dockerfile
    image: media-platform/download-service:latest
    container_name: mp_download_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      QBITTORRENT_URL: ${QBITTORRENT_URL:-http://qbittorrent:8080}
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
      # Same download root as qBittorrent so content_path is readable after completion
      - /opt/media-platform/data/downloads:/downloads
    networks:
      - backend
    depends_on:
      - media-api

  # Optional bundled qBittorrent (or point QBITTORRENT_URL at your existing instance)
  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: mp_qbittorrent
    restart: unless-stopped
    environment:
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
      TZ: ${TZ:-UTC}
      WEBUI_PORT: 8080
    volumes:
      - /opt/media-platform/data/qbittorrent/config:/config
      - /opt/media-platform/data/downloads:/downloads
    ports:
      - "8085:8080"
      - "6881:6881"
      - "6881:6881/udp"
    networks:
      - backend
    profiles:
      - torrents

  # ─────────────────────────────────────────────
  # Phase 13: Duplicate Detection
  # ─────────────────────────────────────────────
  duplicate-service:
    build:
      context: ..
      dockerfile: services/duplicate-service/Dockerfile
    image: media-platform/duplicate-service:latest
    container_name: mp_duplicate_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 14: Storage Management
  # ─────────────────────────────────────────────
  storage-service:
    build:
      context: ..
      dockerfile: services/storage-service/Dockerfile
    image: media-platform/storage-service:latest
    container_name: mp_storage_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 15: Health Monitoring
  # ─────────────────────────────────────────────
  health-service:
    build:
      context: ..
      dockerfile: services/health-service/Dockerfile
    image: media-platform/health-service:latest
    container_name: mp_health_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend

  # ─────────────────────────────────────────────
  # Phase 16: Live TV / Radio / Recordings
  # ─────────────────────────────────────────────
  entertainment-service:
    build:
      context: ..
      dockerfile: services/entertainment-service/Dockerfile
    image: media-platform/entertainment-service:latest
    container_name: mp_entertainment_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    volumes:
      - /opt/media-platform/data:/opt/media-platform/data
    networks:
      - backend
      - media

  # ─────────────────────────────────────────────
  # Phase 18: AI Integration (Ollama client)
  # ─────────────────────────────────────────────
  ai-service:
    build:
      context: ..
      dockerfile: services/ai-service/Dockerfile
    image: media-platform/ai-service:latest
    container_name: mp_ai_service
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      OLLAMA_URL: ${OLLAMA_URL:-http://ollama:11434}
    networks:
      - backend

  ollama:
    image: ollama/ollama:latest
    container_name: mp_ollama
    restart: unless-stopped
    volumes:
      - /opt/media-platform/data/ollama:/root/.ollama
    ports:
      - "11434:11434"
    networks:
      - backend
    profiles:
      - ai

  # ─────────────────────────────────────────────
  # Phase 17: Dashboard
  # ─────────────────────────────────────────────
  dashboard:
    build:
      context: ..
      dockerfile: services/dashboard/Dockerfile
    image: media-platform/dashboard:latest
    container_name: mp_dashboard
    restart: unless-stopped
    env_file:
      - ../.env
    networks:
      - frontend
      - backend
    depends_on:
      - media-api
