# Media Automation Platform — Infrastructure Compose
# ─────────────────────────────────────────────────────────────────────────────
# USAGE — always run from the project root (/opt/media-platform):
#
#   cp .env.sample .env          # first time only
#   nano .env                    # fill in passwords
#   docker compose --env-file .env -f compose/infrastructure.yml up -d
#
# ─────────────────────────────────────────────────────────────────────────────

name: media-platform-infra

networks:
  frontend:
    name: mp_frontend
    external: true
  backend:
    name: mp_backend
    external: true
  media:
    name: mp_media
    external: true
  monitoring:
    name: mp_monitoring
    external: true

volumes:
  postgres_data:
    name: mp_postgres_data
  redis_data:
    name: mp_redis_data
  nginx_logs:
    name: mp_nginx_logs

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 16
  # ─────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-media_platform}
      POSTGRES_USER: ${POSTGRES_USER:-media}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ../config/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    networks:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-media} -d ${POSTGRES_DB:-media_platform}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Redis 7
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: mp_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD}
      --maxmemory ${REDIS_MAX_MEMORY:-512mb}
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
      --save 60 10000
      --appendonly yes
      --appendfilename appendonly.aof
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - backend
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # ─────────────────────────────────────────────
  # Nginx (Reverse Proxy)
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:stable-alpine
    container_name: mp_nginx
    restart: unless-stopped
    ports:
      - "${NGINX_HTTP_PORT:-80}:80"
      - "${NGINX_HTTPS_PORT:-443}:443"
    volumes:
      - ../config/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ../config/nginx/conf.d:/etc/nginx/conf.d:ro
      - nginx_logs:/var/log/nginx
    networks:
      - frontend
      - backend
      - media
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

